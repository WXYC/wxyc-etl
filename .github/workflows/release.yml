name: Release

# Tag-driven publish for both halves of the wxyc-etl workspace plus the
# wxyc-postgres Docker image.
#
#   git tag v0.1.0 && git push origin v0.1.0
#
# A `workflow_dispatch` run with `dry_run: true` (the default) is the safe way
# to rehearse the pipeline without touching crates.io, PyPI, or GHCR. It runs
# every build + a `cargo publish --dry-run` + a local image build + smoke test,
# and skips the actual upload / push steps.
#
# Required repo secrets (set up once in GitHub → Settings → Secrets):
#   CRATES_IO_TOKEN   API token from https://crates.io/me — needs `publish-new` + `publish-update` scopes
#   PYPI_API_TOKEN    API token from https://pypi.org/manage/account/token/ — scope to the `wxyc-etl` project after first publish
# GHCR uses the default GITHUB_TOKEN with `packages: write` granted on the
# publish-postgres-image job — no separate secret needed.

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip cargo/PyPI/GHCR uploads (rehearsal mode)"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - id: v
        name: Verify Cargo.toml version matches tag
        shell: bash
        run: |
          set -euo pipefail
          CARGO_VERSION=$(awk -F'"' '/^version =/ { print $2; exit }' Cargo.toml)
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
            if [[ "$TAG_VERSION" != "$CARGO_VERSION" ]]; then
              echo "::error ::Tag $TAG_VERSION does not match Cargo.toml workspace version $CARGO_VERSION"
              exit 1
            fi
          fi
          echo "Workspace version: $CARGO_VERSION"
          echo "version=$CARGO_VERSION" >> "$GITHUB_OUTPUT"

  publish-crate:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo publish (dry-run)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: cargo publish -p wxyc-etl --dry-run
      - name: cargo publish
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run) }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish -p wxyc-etl

  build-wheels:
    needs: verify
    name: wheel ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,     target: x86_64-unknown-linux-gnu,  manylinux: auto }
          # Native aarch64 runner: cross-compiling ring from x86_64 hits an
          # "ARM assembler must define __ARM_ARCH" error because the manylinux
          # container's cross toolchain isn't fully configured. Native builds
          # avoid the cross-compile entirely.
          - { os: ubuntu-24.04-arm,  target: aarch64-unknown-linux-gnu, manylinux: auto }
          - { os: macos-latest,      target: aarch64-apple-darwin,      manylinux: '' }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # `-i python3.12` tells maturin which interpreter headers to build against
      # inside the manylinux container. Combined with the `abi3-py39` feature
      # on pyo3, the resulting wheel is a single abi3 artifact compatible with
      # Python 3.9+ on this platform, so we don't fan the matrix out over
      # Python versions.
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          working-directory: wxyc-etl-python
          args: --release --out dist -i python3.12
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: wxyc-etl-python/dist

  build-sdist:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: wxyc-etl-python
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: wxyc-etl-python/dist

  publish-postgres-image:
    needs: verify
    name: image pg${{ matrix.pg }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - pg: "17"
            dockerfile: infra/wxyc-postgres/Dockerfile.pg17
          - pg: "16"
            dockerfile: infra/wxyc-postgres/Dockerfile.pg16
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.verify.outputs.version }}"
          PG="${{ matrix.pg }}"
          FLOATING="ghcr.io/wxyc/wxyc-postgres:pg${PG}"
          PINNED="ghcr.io/wxyc/wxyc-postgres:pg${PG}-v${VERSION}"
          echo "floating=${FLOATING}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${FLOATING}"
            echo "${PINNED}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Build (local, single-arch) for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.floating }}
      # Full smoke suite lives in infra/wxyc-postgres/smoke-test.sh so the exact
      # CI assertions are reproducible locally (off-prod validation evidence).
      # It covers: baked-dictionary integrity, the byte-identical unset baseline
      # (postgres user, SSL, listen_addresses), the WXYC_PG_EXTRA_ARGS tuning hook
      # (multi-flag, last-wins, command-line source), and process-model + restart
      # integrity. See the script header for the full list.
      - name: Smoke test
        shell: bash
        run: bash infra/wxyc-postgres/smoke-test.sh "${{ steps.tags.outputs.floating }}" "${{ matrix.pg }}"
      - name: Build + push (multi-arch)
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run) }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.tags }}
      - name: Skip push (dry-run)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        shell: bash
        run: |
          echo "Dry-run mode: would push the following tags to GHCR:"
          echo "${{ steps.tags.outputs.tags }}"

  publish-pypi:
    needs: [publish-crate, build-wheels, build-sdist]
    runs-on: ubuntu-latest
    steps:
      # Filter to wheels + sdist only. docker/build-push-action@v6 uploads
      # opaque `*.dockerbuild` provenance artifacts to the run that would
      # otherwise be pulled in here and fail the download step.
      - uses: actions/download-artifact@v4
        with:
          pattern: "{wheel-*,sdist}"
          path: dist
          merge-multiple: true
      - name: List artifacts
        run: ls -la dist/
      - name: Skip upload (dry-run)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: |
          echo "Dry-run mode: would upload the following artifacts:"
          ls -la dist/
      - uses: PyO3/maturin-action@v1
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run) }}
        with:
          command: upload
          args: --skip-existing dist/*
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
